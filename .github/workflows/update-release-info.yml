name: Update release info

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch releases from app repo
        run: |
          curl -sL --fail \
            "https://api.github.com/repos/Aasdqwe1/agent-toolbox/releases?per_page=30" \
            -o /tmp/releases.json

      - name: Generate release-info.json
        run: python3 .github/scripts/gen-release-info.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/release-info.json apk/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update release-info.json + mirror APK"
            git push
          fi
